<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Sushi Mist</title>

<style>

/* PALETA KYOTO */

:root {
--matcha: #6b7f6a;
--musgo: #3e4f4f;
--azul: #4a5d6b;
--gris: #2b3438;
}

body {
margin: 0;
font-family: system-ui, -apple-system;
background: linear-gradient(
rgba(20,30,35,0.92),
rgba(10,15,18,0.95)
),
url("https://images.unsplash.com/photo-1526481280690-7c2a0b3bde59");
background-size: cover;
background-position: center;
color: white;
overflow-x: hidden;
}

/* LLUVIA */

.rain {
position: fixed;
width: 100%;
height: 100%;
pointer-events: none;
background-image:
repeating-linear-gradient(
transparent,
transparent 2px,
rgba(255,255,255,0.15) 3px
);
animation: rain 0.4s linear infinite;
}

@keyframes rain {
from {background-position:0 0;}
to {background-position:0 10px;}
}

/* LOADER */

#loader {
position: fixed;
width: 100%;
height: 100%;
background: var(--gris);
display: flex;
justify-content: center;
align-items: center;
flex-direction: column;
z-index: 999;
}

.sushi {
font-size: 70px;
animation: bite 1s infinite;
}

@keyframes bite {
0% {transform: scale(1);}
50% {transform: scale(0.85);}
100% {transform: scale(1);}
}

/* HEADER */

header {
text-align: center;
padding: 60px 20px 20px;
}

h1 {
font-size: 42px;
letter-spacing: 3px;
color: #dfe8d8;
}

/* PERSONAJE */

.character {
position: fixed;
bottom: 15px;
right: 15px;
font-size: 70px;
transition: transform 0.3s;
}

.character.jump {
transform: scale(1.2);
}

/* MENSAJE */

.bubble {
position: fixed;
bottom: 95px;
right: 20px;
background: var(--azul);
padding: 10px 14px;
border-radius: 12px;
font-size: 14px;
display: none;
}

/* MENU */

.menu {
padding: 15px;
}

.card {
background: rgba(255,255,255,0.06);
margin: 12px 0;
padding: 18px;
border-radius: 14px;
font-size: 18px;
display: flex;
justify-content: space-between;
align-items: center;
transition: 0.2s;
}

.card:hover {
background: rgba(255,255,255,0.15);
}

.add {
background: var(--matcha);
border: none;
color: white;
padding: 10px 16px;
border-radius: 10px;
font-size: 16px;
cursor: pointer;
}

/* CARRITO */

.cart {
position: sticky;
bottom: 0;
background: rgba(0,0,0,0.85);
padding: 15px;
text-align: center;
font-size: 18px;
}

.order {
margin-top: 10px;
background: #25D366;
border: none;
padding: 14px 28px;
font-size: 18px;
border-radius: 12px;
color: white;
cursor: pointer;
}

</style>

</head>

<body>

<div class="rain"></div>

<div id="loader">
<div class="sushi">🍣</div>
<div>Cargando experiencia...</div>
</div>

<header>

<h1>SUSHI MIST</h1>

</header>

<div class="menu">

<div class="card">
🍣 Sushi especiales
<button class="add" onclick="add('Sushi especiales')">Agregar</button>
</div>

<div class="card">
🥟 Dumplings
<button class="add" onclick="add('Dumplings')">Agregar</button>
</div>

<div class="card">
🍤 Ebi de camarón
<button class="add" onclick="add('Ebi de camarón')">Agregar</button>
</div>

<div class="card">
🍙 Onigiri
<button class="add" onclick="add('Onigiri')">Agregar</button>
</div>

<div class="card">
🥟 Empanadas Samosa
<button class="add" onclick="add('Empanadas Samosa')">Agregar</button>
</div>

</div>

<div class="cart" id="cart">

Tu pedido: vacío

<br>

<button class="order" onclick="ordenar()">
Enviar pedido por WhatsApp
</button>

</div>

<div class="bubble" id="bubble">
¡Buena elección!
</div>

<div class="character" id="character">
🧒
</div>

<audio id="sound">
<source src="https://www.soundjay.com/buttons/sounds/button-09.mp3">
</audio>

<script>

/* LOADER */

window.onload = function() {

setTimeout(function() {

document.getElementById("loader").style.display = "none";

}, 1600);

}

/* CARRITO */

let cart = [];

function add(item) {

cart.push(item);

document.getElementById("cart").innerHTML =
"Tu pedido: " + cart.join(", ") +
"<br><button class='order' onclick='ordenar()'>Enviar pedido por WhatsApp</button>";

let character =
document.getElementById("character");

character.classList.add("jump");

setTimeout(() => {
character.classList.remove("jump");
}, 300);

/* MENSAJE */

let bubble =
document.getElementById("bubble");

bubble.style.display = "block";

setTimeout(() => {
bubble.style.display = "none";
}, 1600);

/* SONIDO */

document.getElementById("sound").play();

}

/* WHATSAPP */

function ordenar() {

let numero = "52473962";

let mensaje =
"Hola, quiero ordenar en Sushi Mist: " +
cart.join(", ");

let url =
"https://wa.me/" +
numero +
"?text=" +
encodeURIComponent(mensaje);

window.open(url);

}

</script>

</body>
</html>
