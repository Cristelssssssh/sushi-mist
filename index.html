<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Sushi Mist Delivery</title>

<style>

/* PALETA KYOTO LLUVIA */

body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(
        rgba(40, 60, 60, 0.85),
        rgba(20, 30, 35, 0.95)
    );
    color: white;
    overflow-x: hidden;
}

/* LLUVIA */

.rain {
    position: fixed;
    width: 100%;
    height: 100%;
    background-image:
    repeating-linear-gradient(
        transparent,
        transparent 2px,
        rgba(255,255,255,0.15) 3px
    );
    animation: rainFall 0.4s linear infinite;
    pointer-events: none;
}

@keyframes rainFall {
    from {
        background-position: 0 0;
    }
    to {
        background-position: 0 10px;
    }
}

/* LOADER SUSHI */

#loader {
    position: fixed;
    width: 100%;
    height: 100%;
    background: #1f2f2f;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    z-index: 999;
}

.sushi {
    font-size: 70px;
    animation: bite 1s infinite;
}

@keyframes bite {
    0% { transform: scale(1); }
    50% { transform: scale(0.85); }
    100% { transform: scale(1); }
}

.loading-text {
    margin-top: 10px;
    color: #c7d6c7;
}

/* HEADER */

header {
    text-align: center;
    padding: 60px 20px;
}

h1 {
    font-size: 48px;
    color: #dbe6d3;
    letter-spacing: 2px;
}

.subtitle {
    color: #9fb3a7;
    font-size: 18px;
}

/* PERSONAJE */

.character {
    font-size: 60px;
    margin-top: 20px;
    transition: transform 0.3s;
}

.character.happy {
    transform: scale(1.2);
}

/* BOTON */

.order-button {
    margin-top: 30px;
    background: #4f6f6f;
    color: white;
    padding: 18px 35px;
    font-size: 20px;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    transition: 0.3s;
}

.order-button:hover {
    background: #6e8f8f;
    transform: scale(1.05);
}

/* MENU */

.menu {
    padding: 30px;
    text-align: center;
}

.item {
    background: rgba(255,255,255,0.05);
    margin: 15px auto;
    padding: 18px;
    width: 90%;
    border-radius: 12px;
    font-size: 18px;
    cursor: pointer;
    transition: 0.3s;
}

.item:hover {
    background: rgba(255,255,255,0.12);
    transform: scale(1.03);
}

.cart {
    margin-top: 20px;
    font-size: 20px;
    color: #cdddc7;
}

footer {
    text-align: center;
    padding: 20px;
    color: #9fb3a7;
}

</style>

</head>

<body>

<div class="rain"></div>

<div id="loader">

<div class="sushi">
🍣
</div>

<div class="loading-text">
Preparando tu experiencia...
</div>

</div>

<header>

<h1>
SUSHI MIST
</h1>

<div class="subtitle">
Delivery rápido • Sushi fresco • Kyoto en lluvia
</div>

<div id="character" class="character">
🧒
</div>

<button class="order-button" onclick="ordenar()">
Ordenar por WhatsApp
</button>

</header>

<div class="menu">

<div class="item" onclick="addItem('Sushi especiales')">
🍣 Sushi especiales
</div>

<div class="item" onclick="addItem('Dumplings')">
🥟 Dumplings
</div>

<div class="item" onclick="addItem('Ebi de camarón')">
🍤 Ebi de camarón
</div>

<div class="item" onclick="addItem('Onigiri')">
🍙 Onigiri
</div>

<div class="item" onclick="addItem('Empanadas Samosa')">
🥟 Empanadas Samosa
</div>

<div class="item" onclick="addItem('Gunkan')">
🍣 Gunkan
</div>

<div class="cart" id="cart">
Tu pedido: vacío
</div>

<button class="order-button" onclick="ordenar()">
Finalizar pedido
</button>

</div>

<footer>

Sushi Mist • Delivery

</footer>

<script>

/* LOADER */

window.onload = function() {

setTimeout(function() {

document.getElementById("loader").style.display = "none";

}, 2000);

}

/* CARRITO */

let cart = [];

function addItem(item) {

cart.push(item);

document.getElementById("cart").innerText =
"Tu pedido: " + cart.join(", ");

let character =
document.getElementById("character");

character.classList.add("happy");

setTimeout(function() {

character.classList.remove("happy");

}, 500);

}

/* WHATSAPP */

function ordenar() {

let numero = "52473962";

let mensaje =
"Hola, quiero hacer un pedido en Sushi Mist: " +
cart.join(", ");

let url =
"https://wa.me/" +
numero +
"?text=" +
encodeURIComponent(mensaje);

window.open(url, "_blank");

}

</script>

</body>
</html>
